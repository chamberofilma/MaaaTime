<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaaaTime</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e6f4ea, #fde7ef, #fff9db);
      padding: 20px;
    }
    .container { max-width: 800px; margin: auto; }
    h1 { text-align: center; color: #6aa67c; }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
    .settings-btn { background: #f8cdd8; color: white; }
    .card {
      background: rgba(255,255,255,0.85);
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #eee;
    }
    textarea { min-height: 100px; }
    .post-title {
      color: #f4a6b5;
      font-weight: bold;
      cursor: pointer;
    }
    .delete-btn {
      background: #ffb3b3;
      color: white;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>MaaaTime 🌷</h1>
  <button class="settings-btn" onclick="openSettings()">Settings</button>

  <div id="settings" class="card" style="display:none;">
    <input id="title" placeholder="Judul tulisan ✨">
    <textarea id="content" placeholder="Tulis isi kamu di sini... 🌼"></textarea>
    <button onclick="addPost()" style="background:#b7e4c7;color:white;">Tambah Tulisan</button>
  </div>

  <div id="posts"></div>
</div>

<script>
  const PASSWORD = "48211"; // ganti sesuai keinginan kamu
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  function openSettings() {
    const input = prompt("Masukkan password:");
    if (input === PASSWORD) {
      const el = document.getElementById("settings");
      el.style.display = el.style.display === "none" ? "block" : "none";
    } else {
      alert("Password salah 😢");
    }
  }

  function addPost() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    if (!title || !content) return;

    posts.unshift({ title, content, open: false });
    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    renderPosts();
  }

  function togglePost(index) {
    posts[index].open = !posts[index].open;
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
  }

  function deletePost(index) {
    if (!confirm("Yakin mau hapus tulisan ini?")) return;
    posts.splice(index, 1);
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
  }

  function renderPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <span class="post-title" onclick="togglePost(${index})">
            📁 ${post.title}
          </span>
          <button class="delete-btn" onclick="deletePost(${index})">Hapus</button>
        </div>
        ${post.open ? `<div style="margin-top:10px;">${post.content.replace(/\n/g, "<br>")}</div>` : ""}
      `;

      container.appendChild(div);
    });
  }

  renderPosts();
</script>

</body>
</html>
