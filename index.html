<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaaaTime</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(180deg, #f4fff8, #fff4f8, #fffbea);
  min-height: 100vh;
  padding: 25px 15px;
  color: #444;
}

.container {
  max-width: 760px;
  margin: auto;
}

h1 {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  color: #7aa892;
  margin-bottom: 20px;
}

.settings-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 10px 16px;
  border: none;
  border-radius: 14px;
  background: #f6d6de;
  color: #555;
  cursor: pointer;
}

.card {
  background: #ffffff;
  padding: 28px 22px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.05);

  border-right: 4px solid #f2c6cf; /* ini lis pink */
}

/* SETTINGS LAYOUT */
#settings {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* INPUT FIX */
input, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 14px;

  border: none !important;
  outline: none !important;
  box-shadow: none !important;

  background: #f8f8f8;
  font-family: 'Quicksand', sans-serif;

  appearance: none;
  -webkit-appearance: none;
}

textarea {
  min-height: 120px;
  text-align: justify;
  margin-top: 12px;
}

input::placeholder, textarea::placeholder {
  color: #bbb;
}

/* BUTTON */
#settings button:not(.delete-btn) {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #cfe3d4;
}

  margin-top: 10px; /* INI YANG NAMBAH JARAK */
}

/* POST */
.post-title {
  font-size: 18px;
  font-weight: 600;
  color: #d88fa0 !important;
  cursor: pointer;
}

.content {
  margin-top: 12px;
  line-height: 1.9;
  text-align: justify;
  display: none;
}

/* DELETE */
.delete-list {
  margin-top: 10px;
}

.delete-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f1dada;
}

.delete-btn {
  background: #f6e7b4; /* soft yellow */
  border: none;
  border-radius: 12px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;

  width: auto; /* ini biar ga full panjang */
  flex-shrink: 0; /* biar ga ketarik */
}

</style>
</head>

<body>

<div class="container">
  <h1>MaaaTime</h1>

  <button class="settings-btn" onclick="openSettings()">Settings</button>

  <div id="settings" class="card" style="display:none;">
    <input id="title" placeholder="Judul tulisan ✨">
    <textarea id="content" placeholder="Tulis isi kamu di sini... 🌼"></textarea>
    <button onclick="addPost()">Tambah Tulisan</button>

    <div class="delete-list" id="deleteList"></div>
  </div>

  <div id="posts"></div>
</div>

<script>

const PASSWORD = "48211";

let posts = JSON.parse(localStorage.getItem("posts")) || [];

/* FIX DATA LAMA */
posts = posts.map(post => ({
  title: post.title || "",
  content: post.content || "",
  date: post.date || new Date().toLocaleDateString("id-ID"),
  open: false
}));

function openSettings() {
  const input = prompt("Masukkan password:");
  if (input === PASSWORD) {
    const el = document.getElementById("settings");
    el.style.display = el.style.display === "none" ? "block" : "none";
    renderDeleteList();
  } else {
    alert("Password salah 😢");
  }
}

function addPost() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!title || !content) return;

  const date = new Date().toLocaleDateString("id-ID", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  posts.unshift({ title, content, date, open: false });
  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";

  renderPosts();
  renderDeleteList();
}

function togglePost(index) {
  posts[index].open = !posts[index].open;
  localStorage.setItem("posts", JSON.stringify(posts));
  renderPosts();
}

function deletePost(index) {
  if (!confirm("Yakin mau hapus tulisan ini?")) return;
  posts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  renderPosts();
  renderDeleteList();
}

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach((post, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="post-title" onclick="togglePost(${index})">
        ${post.title}
        <div style="font-size:12px; color:#999; margin-top:3px;">
          ${post.date}
        </div>
      </div>

      <div class="content" style="display:${post.open ? 'block' : 'none'};">
  ${post.content
    .split("\n\n")
    .map(p => `<p>${p}</p>`)
    .join("")
  }
</div>
    `;

    container.appendChild(div);
  });
}

function renderDeleteList() {
  const container = document.getElementById("deleteList");
  container.innerHTML = "<b style='color:#d88fa0;'>Hapus Tulisan:</b>";

  posts.forEach((post, index) => {
    const div = document.createElement("div");
    div.className = "delete-item";

    div.innerHTML = `
      <span>${post.title}</span>
      <button class="delete-btn" onclick="deletePost(${index})">Hapus</button>
    `;

    container.appendChild(div);
  });
}

renderPosts();

</script>

</body>
  </html>
