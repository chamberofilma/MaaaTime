<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaaaTime</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #e6f4ea, #fde7ef, #fff9db);
      padding: 20px;
    }
    .container { max-width: 800px; margin: auto; }
    h1 {
      text-align: center;
      color: #6aa67c;
      font-family: 'Patrick Hand', cursive;
      font-size: 40px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }
    button:hover { transform: scale(1.05); }
    .settings-btn { background: #f8dce3; color: #555; }

    .card {
      background: rgba(255,255,255,0.85);
      padding: 20px;
      border-radius: 20px;
      margin-top: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-3px); }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #eee;
      font-family: 'Quicksand', sans-serif;
    }

    textarea {
      min-height: 120px;
      text-align: justify;
    }

    .post-title {
      color: #f2a7b5;
      font-weight: 600;
      cursor: pointer;
      font-size: 18px;
    }

    .content {
      margin-top: 10px;
      line-height: 1.7;
      text-align: justify;
      color: #444;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .delete-list {
      margin-top: 10px;
      font-size: 14px;
    }

    .delete-item {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }

    .delete-btn {
      background: #ffc9c9;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>MaaaTime 🌷</h1>
  <button class="settings-btn" onclick="openSettings()">Settings</button>

  <div id="settings" class="card" style="display:none;">
    <input id="title" placeholder="Judul tulisan ✨">
    <textarea id="content" placeholder="Tulis isi kamu di sini... 🌼"></textarea>
    <button onclick="addPost()" style="background:#cdeac0;color:#555;">Tambah Tulisan</button>

    <div class="delete-list" id="deleteList"></div>
  </div>

  <div id="posts"></div>
</div>

<script>
  const PASSWORD = "48211";
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  function openSettings() {
    const input = prompt("Masukkan password:");
    if (input === PASSWORD) {
      const el = document.getElementById("settings");
      el.style.display = el.style.display === "none" ? "block" : "none";
      renderDeleteList();
    } else {
      alert("Password salah 😢");
    }
  }

  function addPost() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    if (!title || !content) return;

    posts.unshift({ title, content, open: false });
    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    renderPosts();
    renderDeleteList();
  }

  function togglePost(index) {
    posts[index].open = !posts[index].open;
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
  }

  function deletePost(index) {
    if (!confirm("Yakin mau hapus tulisan ini?")) return;
    posts.splice(index, 1);
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
    renderDeleteList();
  }

  function renderPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="post-title" onclick="togglePost(${index})">
          🌷 ${post.title}
        </div>
        ${post.open ? `<div class="content">${post.content.replace(/\n/g, "<br>")}</div>` : ""}
      `;

      container.appendChild(div);
    });
  }

  function renderDeleteList() {
    const container = document.getElementById("deleteList");
    container.innerHTML = "<b>Hapus Tulisan:</b>";

    posts.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "delete-item";
      div.innerHTML = `
        <span>${post.title}</span>
        <button class="delete-btn" onclick="deletePost(${index})">Hapus</button>
      `;
      container.appendChild(div);
    });
  }

  renderPosts();
</script>

</body>
</html>
